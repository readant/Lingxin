name: lingxin
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10

  # PyTorch (CPU版本)
  - pytorch>=2.0.0,<2.12.0
  - torchvision>=0.15.0
  - cpuonly

  # 核心依赖（conda安装）
  - scikit-learn>=1.3.0,<1.5.0
  - pandas>=2.0.0
  - numpy>=1.24.0,<1.27.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - tqdm>=4.65.0
  - pillow>=10.0.0
  - opencv>=4.8.0
  - flask>=3.0.0

  # pip专有包
  - pip:
    # 新版MediaPipe（支持Task API）
    - mediapipe>=0.10.33
    - flask-cors>=4.0.0