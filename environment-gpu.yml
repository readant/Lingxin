name: lingxin-gpu
# =============================================================================
# 硬件环境：NVIDIA RTX 5060 Laptop GPU (Blackwell, sm_120)
# 驱动：CUDA 13.1 (向后兼容 CUDA 12.8)
#
# 版本选择逻辑：
#   Python 3.10  — 与项目现有 lingxin 环境保持一致，避免兼容性问题
#   CUDA 12.8    — Blackwell 最低要求 (≥12.8)
#   PyTorch 2.8  — 最后一个支持 Python 3.10 的 GPU 版本，2.9+ 不再支持 py310
#
# 关键决策：PyTorch 必须从官方 pip wheel 安装，而非 conda
#   原因：conda 频道的 pytorch gpu_cuda128 预编译时未开启 sm_120 支持，
#   RTX 5060 (Blackwell) 会报 "not compatible" 错误。
#   只有 PyTorch 官方构建的 cu128 wheel 真正编译了 sm_120 kernel。
# =============================================================================

channels:
  # 清华镜像（国内加速）
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/free

dependencies:
  - python=3.10

  # ====== 核心依赖（conda 安装，与 CPU 环境保持一致） ======
  - scikit-learn>=1.3.0,<1.5.0
  - pandas>=2.0.0
  - numpy>=1.24.0,<1.27.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - tqdm>=4.65.0
  - pillow>=10.0.0
  - flask>=3.0.0

  - pip
  - pip:
    # opencv-contrib-python 替代 conda opencv：含全部核心功能 + 扩展模块（SIFT/SURF/ArUco等）
    # 不能与 conda 的 opencv 同时安装
    - opencv-contrib-python>=4.8.0
    - mediapipe>=0.10.33
    - flask-cors>=4.0.0

# =============================================================================
# 环境创建后需手动安装 PyTorch（原因见上方注释）：
#   conda activate lingxin-gpu
#   pip install torch>=2.8.0 torchvision>=0.21.0 --index-url https://download.pytorch.org/whl/cu128
# =============================================================================
